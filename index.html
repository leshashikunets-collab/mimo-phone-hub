<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="MiMo"/>
  <meta name="theme-color" content="#ff6900"/>
  <link rel="manifest" href="manifest.json"/>
  <title>MiMo</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root,.theme-mimo{--bg:#0d0d0f;--panel:#1b1b21;--sidebar:#141418;--border:#2a2a33;--text:#ececf1;--muted:#9b9ba7;--accent:#ff6900;--accent-soft:rgba(255,105,0,.15);--user:#2a2a35;--grad:linear-gradient(135deg,#ff6900,#ff9a3c);--send-fg:#111}
    .theme-chatgpt{--bg:#212121;--panel:#2f2f2f;--sidebar:#171717;--border:#424242;--text:#ececec;--muted:#b4b4b4;--accent:#10a37f;--accent-soft:rgba(16,163,127,.15);--user:#303030;--grad:linear-gradient(135deg,#10a37f,#1a7f64);--send-fg:#fff}
    .theme-gemini{--bg:#131314;--panel:#282a2c;--sidebar:#1e1f20;--border:#3c4043;--text:#e3e3e3;--muted:#9aa0a6;--accent:#8ab4f8;--accent-soft:rgba(138,180,248,.12);--user:#303134;--grad:linear-gradient(135deg,#4285f4,#8ab4f8);--send-fg:#111}
    .theme-grok{--bg:#000;--panel:#111;--sidebar:#0a0a0a;--border:#222;--text:#f5f5f5;--muted:#888;--accent:#fff;--accent-soft:rgba(255,255,255,.08);--user:#1a1a1a;--grad:linear-gradient(135deg,#fff,#999);--send-fg:#000}
    .theme-claude{--bg:#1a1814;--panel:#2a2620;--sidebar:#211e19;--border:#3d3830;--text:#f0ebe3;--muted:#a89f91;--accent:#d97757;--accent-soft:rgba(217,119,87,.14);--user:#322e28;--grad:linear-gradient(135deg,#d97757,#e8b89a);--send-fg:#111}
    .theme-copilot{--bg:#0f111a;--panel:#1c2030;--sidebar:#151823;--border:#2b3150;--text:#e8ebf7;--muted:#9aa3c7;--accent:#7b8cff;--accent-soft:rgba(123,140,255,.14);--user:#232942;--grad:linear-gradient(135deg,#5b6ee1,#7b8cff);--send-fg:#111}
    .theme-deepseek{--bg:#0b1220;--panel:#152238;--sidebar:#101a2e;--border:#243656;--text:#e6edf7;--muted:#8ba3c7;--accent:#4d9fff;--accent-soft:rgba(77,159,255,.14);--user:#1a2a45;--grad:linear-gradient(135deg,#2f7fd4,#4d9fff);--send-fg:#111}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;transition:background .2s,color .2s}
    button,input,select,textarea{font:inherit;touch-action:manipulation}
    .app{display:flex;flex-direction:column;height:100dvh;padding-bottom:env(safe-area-inset-bottom)}

    .top{background:var(--panel);border-bottom:2px solid var(--accent);padding:10px 12px;padding-top:calc(10px + env(safe-area-inset-top));display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .ib{width:44px;height:44px;border:none;border-radius:12px;background:var(--accent);color:var(--send-fg);font-size:1.05rem;font-weight:900;flex-shrink:0;cursor:pointer;display:grid;place-items:center}
    .ib.sec{background:var(--sidebar);border:1px solid var(--border);color:var(--text)}
    .ib:disabled{opacity:.4}
    .brand{display:flex;align-items:center;gap:8px;margin-right:auto;min-width:0}
    .logo{width:36px;height:36px;border-radius:11px;background:var(--grad);display:grid;place-items:center;color:var(--send-fg);font-weight:900;font-size:.95rem;flex-shrink:0}
    .brand-t{font-weight:800;font-size:1rem;line-height:1.1}
    .brand-t small{display:block;font-size:.68rem;color:var(--muted);font-weight:500}

    .ctrl-row{display:flex;gap:8px;padding:8px 12px;background:var(--sidebar);border-bottom:1px solid var(--border);overflow-x:auto}
    .ctrl{flex:1;min-width:110px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 10px;font-size:.84rem;font-weight:600}

    .modes{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}
    .modes::-webkit-scrollbar{display:none}
    .chip{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:999px;padding:8px 14px;font-size:.82rem;white-space:nowrap;cursor:pointer;flex-shrink:0}
    .chip.on{background:var(--accent);color:var(--send-fg);border-color:var(--accent);font-weight:700}

    .bar{padding:8px 12px;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border);background:var(--sidebar)}
    .bar .title{flex:1;font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .btn-sm{border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:10px;padding:8px 12px;font-size:.8rem;font-weight:600;cursor:pointer;min-height:40px}
    .status-pill{font-size:.74rem;color:var(--muted);text-align:center;padding:4px 12px 6px}

    .msgs{flex:1;overflow-y:auto;padding:12px 12px 130px;-webkit-overflow-scrolling:touch}
    .inner{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
    .welcome{text-align:center;padding:24px 8px}
    .welcome h1{margin:0 0 8px;font-size:1.55rem;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
    .welcome p{color:var(--muted);font-size:.88rem;line-height:1.45;margin:0}
    .sg{display:grid;grid-template-columns:1fr;gap:8px;margin-top:16px}
    .sg button{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--text);text-align:left;font-size:.9rem}

    .msg{display:grid;grid-template-columns:34px 1fr;gap:10px}
    .av{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:.72rem;font-weight:800;background:var(--panel);border:1px solid var(--border)}
    .av.ai{background:var(--grad);color:var(--send-fg);border:none}
    .bubble{padding:11px 13px;border-radius:13px;line-height:1.55;word-break:break-word;font-size:.94rem}
    .msg.user .bubble{background:var(--user)}
    .bubble pre{background:#0a0a0f;border:1px solid var(--border);border-radius:8px;padding:10px;overflow-x:auto;font-size:.8rem}
    .file-tag{display:inline-block;background:var(--accent-soft);border:1px solid var(--accent);border-radius:8px;padding:2px 8px;font-size:.76rem;margin-bottom:4px}

    .composer{position:fixed;left:0;right:0;bottom:0;padding:8px 12px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 28%)}
    .attach-row{max-width:800px;margin:0 auto 6px;display:flex;flex-wrap:wrap;gap:6px}
    .att{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:6px 10px;font-size:.76rem}
    .att button{background:none;border:none;color:var(--muted);font-size:1rem;padding:0 2px;cursor:pointer}
    .box{max-width:800px;margin:0 auto;background:var(--panel);border:2px solid var(--border);border-radius:20px;display:flex;gap:6px;padding:8px 10px;align-items:flex-end}
    .box:focus-within{border-color:var(--accent)}
    textarea{flex:1;border:none;outline:none;background:transparent;color:var(--text);font:inherit;font-size:16px;line-height:1.4;max-height:140px;resize:none;padding:8px 0}
    #fileIn{display:none}

    .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;display:none}
    .backdrop.open{display:block}
    .drawer{position:fixed;top:0;left:0;width:min(320px,90vw);height:100dvh;background:var(--panel);border-right:1px solid var(--border);z-index:50;transform:translateX(-105%);transition:transform .22s ease;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top)}
    .drawer.open{transform:translateX(0)}
    .drawer-head{padding:14px 12px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .drawer-head b{flex:1;font-size:1rem}
    .drawer-actions{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .drawer-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .chat-item{padding:12px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:8px;align-items:center}
    .chat-item.on{background:var(--accent-soft)}
    .chat-item .t{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.88rem}
    .chat-item .x{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px 8px;min-width:36px;min-height:36px}

    .sheet{position:fixed;left:0;right:0;bottom:0;max-height:85dvh;background:var(--panel);border-top:1px solid var(--border);border-radius:18px 18px 0 0;z-index:60;transform:translateY(105%);transition:transform .22s ease;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
    .sheet.open{transform:translateY(0)}
    .sheet-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
    .sheet-head b{flex:1;font-size:1rem}
    .sheet-body{padding:14px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
    .field label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:6px}
    .field input[type=range]{width:100%}
    .field textarea,.field input[type=text],.field input[type=url]{width:100%;min-height:44px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px;resize:vertical;font-size:.85rem}
    .field textarea{min-height:72px}
    .hint{font-size:.74rem;color:var(--muted);margin:6px 0 0;line-height:1.4}
  </style>
</head>
<body class="theme-mimo">
<div class="backdrop" id="backdrop"></div>

<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <b>Диалоги</b>
    <button class="btn-sm" id="newChatBtn">+ Новый</button>
    <button class="btn-sm" id="closeDrawer">✕</button>
  </div>
  <div class="drawer-actions">
    <button class="btn-sm" id="exportBtn">⬇ Экспорт</button>
    <button class="btn-sm" id="clearChatBtn">🗑 Очистить</button>
  </div>
  <div class="drawer-list" id="chatList"></div>
</aside>

<div class="sheet" id="settingsSheet">
  <div class="sheet-head">
    <b>⚙ Настройки</b>
    <button class="btn-sm" id="closeSettings">Готово</button>
  </div>
  <div class="sheet-body">
    <div class="field">
      <label>Температура: <strong id="tempVal">0.7</strong></label>
      <input type="range" id="tempRange" min="0" max="1" step="0.05" value="0.7"/>
    </div>
    <div class="field">
      <label>Макс. токенов: <strong id="tokensVal">2000</strong></label>
      <input type="range" id="tokensRange" min="500" max="4000" step="100" value="2000"/>
    </div>
    <div class="field">
      <label>Свой системный промпт</label>
      <textarea id="customPrompt" placeholder="Пусто = промпт выбранного режима"></textarea>
    </div>
    <div class="field">
      <label>☁ Синхронизация с ПК</label>
      <input type="url" id="syncUrl" placeholder="http://192.168.100.83:7860"/>
      <p class="hint">ПК включён, запущен MiMo Hub, телефон в той же Wi‑Fi. Диалоги объединяются автоматически.</p>
      <button class="btn-sm" id="syncNowBtn" style="margin-top:8px;width:100%">🔄 Синхронизировать сейчас</button>
    </div>
  </div>
</div>

<div class="app">
  <div class="top">
    <button class="ib sec" id="chatsBtn" title="Диалоги">💬</button>
    <div class="brand">
      <div class="logo">M</div>
      <div class="brand-t">MiMo<small>Мобильный Hub</small></div>
    </div>
    <button class="ib sec" id="settingsBtn" title="Настройки">⚙</button>
    <button class="ib sec" id="regenBtn" title="Повторить ответ">↻</button>
    <button class="ib" id="stopBtn" title="Остановить" style="display:none">■</button>
  </div>

  <div class="ctrl-row">
    <select class="ctrl" id="modelSel" title="Модель"></select>
    <select class="ctrl" id="modeSel" title="Режим"></select>
    <select class="ctrl" id="themeSel" title="Стиль UI"></select>
  </div>

  <div class="modes" id="modes"></div>

  <div class="bar">
    <div class="title" id="chatTitle">Новый чат</div>
    <button class="btn-sm" id="newChatBtn2">+ Новый</button>
  </div>
  <div class="status-pill" id="status">● Готов</div>

  <div class="msgs" id="msgs"><div class="inner" id="inner"></div></div>

  <div class="composer">
    <div class="attach-row" id="atts"></div>
    <div class="box">
      <button class="ib sec" id="attachBtn" title="Прикрепить файл">📎</button>
      <input type="file" id="fileIn" multiple accept=".txt,.md,.py,.js,.ts,.json,.csv,.html,.xml,.yaml,.yml,.java,.cpp,.c,.go,.rs,.sql,.log,.ini,.cfg,.toml"/>
      <textarea id="input" rows="1" placeholder="Сообщение..."></textarea>
      <button class="ib" id="sendBtn" title="Отправить">➤</button>
    </div>
  </div>
</div>

<script>
const API_URL="https://token-plan-sgp.xiaomimimo.com/v1/chat/completions";
const API_KEY="tp-sul5stc88h1g1yd1s265411sw1qrmh1m4z53pi94jffwx7fe";
const STORAGE_KEY="mimo_phone_v3";
const SYNC_URL_KEY="mimo_sync_url";

const MODELS=[
  {id:"mimo-v2.5-pro",name:"MiMo Pro",desc:"Макс. качество"},
  {id:"mimo-v2.5",name:"MiMo v2.5",desc:"Быстрее"}
];
const THEMES=[
  {id:"mimo",name:"MiMo",color:"#ff6900"},
  {id:"chatgpt",name:"ChatGPT",color:"#10a37f"},
  {id:"gemini",name:"Gemini",color:"#8ab4f8"},
  {id:"grok",name:"Grok",color:"#ffffff"},
  {id:"claude",name:"Claude",color:"#d97757"},
  {id:"copilot",name:"Copilot",color:"#7b8cff"},
  {id:"deepseek",name:"DeepSeek",color:"#4d9fff"}
];
const MODES={
  chat:{name:"Чат",icon:"💬",desc:"Универсальный диалог",t:.7,tokens:2000,
    p:"Ты — MiMo, полезный ассистент Xiaomi. Отвечай на русском.",
    sg:["Что ты умеешь?","Помоги спланировать день","Объясни простыми словами","Совет по продуктивности"]},
  code:{name:"Код",icon:"💻",desc:"Программирование",t:.3,tokens:4000,
    p:"Ты — эксперт-программист MiMo. Пиши чистый код с комментариями.",
    sg:["REST API на Python","Найди ошибку в коде","Объясни async/await","SQL с JOIN"]},
  creative:{name:"Творчество",icon:"✨",desc:"Тексты и идеи",t:.95,tokens:3000,
    p:"Ты — креативный писатель MiMo.",
    sg:["Сюжет sci-fi","Пост для соцсетей","Названия стартапа","Персонаж RPG"]},
  analyst:{name:"Аналитик",icon:"📊",desc:"Анализ и структура",t:.4,tokens:3000,
    p:"Ты — аналитик MiMo. Структурируй ответы, таблицы, плюсы/минусы.",
    sg:["SWOT-анализ","Сравни в таблице","Разбери гипотезу","План исследования"]},
  teacher:{name:"Учитель",icon:"📚",desc:"Обучение",t:.5,tokens:2500,
    p:"Ты — преподаватель MiMo. Объясняй от простого к сложному.",
    sg:["Основы Python","Теорема Пифагора","Что такое ML?","Как работает DNS?"]}
};
const TEXT_EXTS=[".txt",".md",".py",".js",".ts",".json",".csv",".html",".xml",".yaml",".yml",".java",".cpp",".c",".go",".rs",".sql",".log",".ini",".cfg",".toml"];

let state=loadState();
let chatId=state.activeId;
let atts=[];
let busy=false;
let abortCtrl=null;
let syncTimer=null;
let syncBusy=false;

const $=id=>document.getElementById(id);
const S=()=>state.settings;

function defaultState(){
  const id=crypto.randomUUID();
  return{
    activeId:id,
    settings:{theme:"mimo",model:"mimo-v2.5-pro",temperature:.7,max_tokens:2000,customPrompt:""},
    chats:{[id]:{id,title:"Новый чат",messages:[],mode:"chat",updatedAt:Date.now()}}
  };
}

function loadState(){
  try{
    const r=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null");
    if(r&&r.chats&&r.settings)return r;
    const v2=JSON.parse(localStorage.getItem("mimo_chats_v2")||"null");
    if(v2&&v2.chats){
      return{activeId:v2.activeId,settings:{theme:"mimo",model:"mimo-v2.5-pro",temperature:.7,max_tokens:2000,customPrompt:""},chats:v2.chats};
    }
    const old=JSON.parse(localStorage.getItem("mimo_phone")||"null");
    if(old&&old.msgs&&old.msgs.length){
      const id=crypto.randomUUID();
      return{activeId:id,settings:{theme:"mimo",model:"mimo-v2.5-pro",temperature:.7,max_tokens:2000,customPrompt:""},
        chats:{[id]:{id,title:"Сохранённый чат",messages:old.msgs,mode:old.mode||"chat",updatedAt:Date.now()}}};
    }
  }catch(_){}
  return defaultState();
}

function getSyncUrl(){
  const url=($("syncUrl")?.value||localStorage.getItem(SYNC_URL_KEY)||"").trim().replace(/\/$/,"");
  return url;
}

function toSyncPayload(st){
  return{version:1,updatedAt:st.updatedAt||Date.now(),activeId:st.activeId,settings:st.settings,chats:st.chats};
}

function mergeSyncState(local,remote){
  const a=toSyncPayload(local);
  const b=remote&&remote.chats?remote:null;
  if(!b)return local;
  const merged={version:1,updatedAt:Math.max(a.updatedAt||0,b.updatedAt||0),settings:{...a.settings},chats:{...a.chats},activeId:a.activeId};
  for(const[id,chat]of Object.entries(b.chats||{})){
    const cur=merged.chats[id];
    if(!cur||(chat.updatedAt||0)>(cur.updatedAt||0))merged.chats[id]=chat;
  }
  if((b.updatedAt||0)>(a.updatedAt||0)){
    merged.settings={...merged.settings,...(b.settings||{})};
    if(b.activeId&&merged.chats[b.activeId])merged.activeId=b.activeId;
  }
  merged.updatedAt=Date.now();
  return{activeId:merged.activeId,settings:merged.settings,chats:merged.chats,updatedAt:merged.updatedAt};
}

function setSyncStatus(extra){
  const base=busy?"● MiMo думает...":"● Готов";
  $("status").textContent=base+" · "+extra;
}

async function pullSyncFromPc(){
  const base=getSyncUrl();
  if(!base){setSyncStatus("☁ Укажите URL ПК");return false;}
  try{
    const res=await fetch(base+"/api/sync",{cache:"no-store"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const remote=await res.json();
    state=mergeSyncState(state,remote);
    chatId=state.activeId;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
    setSyncStatus("☁ Синхронизировано");
    return true;
  }catch(e){
    setSyncStatus("☁ ПК недоступен");
    return false;
  }
}

async function pushSyncToPc(){
  const base=getSyncUrl();
  if(!base||syncBusy)return;
  syncBusy=true;
  state.updatedAt=Date.now();
  try{
    const res=await fetch(base+"/api/sync",{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(toSyncPayload(state))
    });
    setSyncStatus(res.ok?"☁ Сохранено на ПК":"☁ Ошибка синхр.");
  }catch(_){
    setSyncStatus("☁ ПК недоступен");
  }finally{
    syncBusy=false;
  }
}

function saveState(){
  state.activeId=chatId;
  state.updatedAt=Date.now();
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  clearTimeout(syncTimer);
  syncTimer=setTimeout(pushSyncToPc,400);
}

function cur(){return state.chats[chatId];}

function applyTheme(id){
  document.body.className="theme-"+id;
  S().theme=id;
  const t=THEMES.find(x=>x.id===id);
  if(t) document.querySelector('meta[name="theme-color"]').content=t.color;
  saveState();
}

function setMode(k,fromSel=false){
  S().mode=k;
  const m=MODES[k];
  if(m&&!$("customPrompt").value.trim()){
    S().temperature=m.t;
    S().max_tokens=m.tokens;
    $("tempRange").value=m.t;
    $("tempVal").textContent=m.t;
    $("tokensRange").value=m.tokens;
    $("tokensVal").textContent=m.tokens;
  }
  cur().mode=k;
  if(fromSel)$("modeSel").value=k;
  renderModes();
  render();
  saveState();
}

function setLoading(on){
  busy=on;
  $("sendBtn").disabled=on;
  $("regenBtn").disabled=on;
  $("stopBtn").style.display=on?"grid":"none";
  if(!on)setSyncStatus(getSyncUrl()?"☁ Онлайн":"☁ Локально");
}

function openDrawer(){$("drawer").classList.add("open");$("backdrop").classList.add("open");}
function closeDrawer(){$("drawer").classList.remove("open");if(!$("settingsSheet").classList.contains("open"))$("backdrop").classList.remove("open");}
function openSettings(){$("settingsSheet").classList.add("open");$("backdrop").classList.add("open");}
function closeSettings(){$("settingsSheet").classList.remove("open");if(!$("drawer").classList.contains("open"))$("backdrop").classList.remove("open");}

function createChat(){
  const id=crypto.randomUUID();
  state.chats[id]={id,title:"Новый чат",messages:[],mode:S().mode,updatedAt:Date.now()};
  chatId=id;atts=[];renderAtts();saveState();renderAll();closeDrawer();
}

function deleteChat(id,e){
  e.stopPropagation();
  if(Object.keys(state.chats).length<=1){
    const c=state.chats[id];
    c.messages=[];c.title="Новый чат";c.updatedAt=Date.now();
    saveState();renderAll();return;
  }
  delete state.chats[id];
  if(chatId===id)chatId=Object.keys(state.chats)[0];
  atts=[];renderAtts();saveState();renderAll();
}

function switchChat(id){
  chatId=id;
  S().mode=state.chats[id].mode||S().mode;
  $("modeSel").value=S().mode;
  atts=[];renderAtts();saveState();renderAll();closeDrawer();
}

function clearChat(){
  const c=cur();
  c.messages=[];c.title="Новый чат";c.updatedAt=Date.now();
  atts=[];renderAtts();saveState();renderAll();closeDrawer();
}

function exportChat(){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(cur(),null,2)],{type:"application/json"}));
  a.download="mimo-chat.json";
  a.click();
  closeDrawer();
}

function renderChatList(){
  $("chatList").innerHTML="";
  Object.values(state.chats).sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)).forEach(c=>{
    const row=document.createElement("div");
    row.className="chat-item"+(c.id===chatId?" on":"");
    const ic=MODES[c.mode||"chat"]?.icon||"💬";
    row.innerHTML=`<span class="t">${ic} ${esc(c.title)}</span><button class="x" title="Удалить">×</button>`;
    row.onclick=()=>switchChat(c.id);
    row.querySelector(".x").onclick=e=>deleteChat(c.id,e);
    $("chatList").appendChild(row);
  });
}

function renderModes(){
  $("modes").innerHTML="";
  Object.entries(MODES).forEach(([k,m])=>{
    const b=document.createElement("button");
    b.className="chip"+(S().mode===k?" on":"");
    b.textContent=m.icon+" "+m.name;
    b.onclick=()=>{setMode(k,true);$("modeSel").value=k;};
    $("modes").appendChild(b);
  });
}

function renderAll(){
  renderChatList();
  $("chatTitle").textContent=cur().title;
  render();
}

function render(){
  const inner=$("inner");
  inner.innerHTML="";
  const m=MODES[S().mode]||MODES.chat;
  const msgs=cur().messages;
  if(!msgs.length){
    inner.innerHTML=`<div class="welcome"><h1>${m.icon} ${m.name}</h1>
      <p>${m.desc}. Диалоги сохраняются автоматически — нажмите 💬.<br>Модель, тема и настройки — сверху.</p>
      <div class="sg" id="sg"></div></div>`;
    m.sg.forEach(t=>{
      const b=document.createElement("button");
      b.textContent=t;
      b.onclick=()=>send(t);
      $("sg").appendChild(b);
    });
    return;
  }
  msgs.forEach(x=>addMsg(x.role,x.content,false));
  scroll();
}

function formatUser(text){
  return text.replace(/\[Файл: ([^\]]+)\]\n```[\s\S]*?```\n\n/g,(_,n)=>`<span class="file-tag">📎 ${esc(n)}</span><br>`)
    .replace(/^(?!<span)/,s=>esc(s).replace(/\n/g,"<br>"));
}

function addMsg(role,content,anim=true){
  const d=document.createElement("div");
  d.className="msg "+role;
  const html=role==="assistant"?marked.parse(content||""):formatUser(content||"");
  d.innerHTML=`<div class="av ${role==="assistant"?"ai":""}">${role==="user"?"Вы":"M"}</div><div class="bubble">${html}</div>`;
  $("inner").appendChild(d);
  if(anim)scroll();
  return d.querySelector(".bubble");
}

function esc(t){return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function scroll(){$("msgs").scrollTop=$("msgs").scrollHeight;}
function autoResize(){const t=$("input");t.style.height="auto";t.style.height=Math.min(t.scrollHeight,140)+"px";}

function getPrompt(){
  const c=$("customPrompt").value.trim();
  return c||MODES[S().mode]?.p||"";
}

async function onFiles(e){
  for(const f of e.target.files){
    const ext="."+(f.name.split(".").pop()||"").toLowerCase();
    if(!TEXT_EXTS.includes(ext)){alert(`Формат ${ext} не поддерживается`);continue;}
    if(f.size>500000){alert(f.name+" слишком большой (макс. 500 KB)");continue;}
    try{atts.push({name:f.name,size:f.size,content:await f.text()});}catch(_){}
  }
  e.target.value="";renderAtts();
}

function renderAtts(){
  $("atts").innerHTML=atts.map((a,i)=>`<span class="att">📎 ${esc(a.name)} <span style="color:var(--muted)">(${Math.round(a.size/1024)}KB)</span><button onclick="rmAtt(${i})">×</button></span>`).join("");
}
function rmAtt(i){atts.splice(i,1);renderAtts();}

function buildContent(text){
  const parts=atts.map(a=>`[Файл: ${a.name}]\n\`\`\`\n${a.content}\n\`\`\``);
  if(text)parts.push(text);
  return parts.join("\n\n");
}

async function send(text,regen=false){
  if(busy&&!regen)return;
  const chat=cur();
  let userText=regen?"":buildContent((text||$("input").value).trim());

  if(regen){
    if(!chat.messages.length||chat.messages.at(-1).role!=="assistant")return;
    chat.messages.pop();
    saveState();render();
  }else{
    if(!userText)return;
    if(chat.title==="Новый чат")chat.title=(text||$("input").value).trim().slice(0,42)||"Чат с файлами";
    chat.messages.push({role:"user",content:userText});
    chat.updatedAt=Date.now();
    $("input").value="";atts=[];renderAtts();autoResize();
    saveState();renderAll();
  }

  const bubble=addMsg("assistant","");
  setLoading(true);
  abortCtrl=new AbortController();

  try{
    const res=await fetch(API_URL,{
      method:"POST",
      signal:abortCtrl.signal,
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+API_KEY},
      body:JSON.stringify({
        model:$("modelSel").value,
        messages:[{role:"system",content:getPrompt()},...chat.messages],
        temperature:+S().temperature,
        max_tokens:+S().max_tokens,
        stream:true
      })
    });
    if(!res.ok)throw new Error(await res.text());

    const reader=res.body.getReader();
    const dec=new TextDecoder();
    let buf="",reply="";
    while(true){
      const {value,done}=await reader.read();
      if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split("\n");
      buf=lines.pop()||"";
      for(const line of lines){
        if(!line.startsWith("data: "))continue;
        const p=line.slice(6).trim();
        if(!p||p==="[DONE]")continue;
        try{
          const j=JSON.parse(p);
          if(j.error)throw new Error(j.error.message||JSON.stringify(j.error));
          if(!j.choices||!j.choices.length)continue;
          const c=j.choices[0].delta?.content;
          if(c){reply+=c;bubble.innerHTML=marked.parse(reply);scroll();}
        }catch(e){if(e.message&&!e.message.includes("JSON"))throw e;}
      }
    }
    chat.messages.push({role:"assistant",content:reply});
    chat.updatedAt=Date.now();
    saveState();
    renderChatList();
    $("chatTitle").textContent=chat.title;
  }catch(e){
    if(e.name!=="AbortError")bubble.innerHTML=`<span style="color:#ff6b6b">Ошибка: ${esc(e.message)}</span>`;
  }finally{
    abortCtrl=null;
    setLoading(false);
  }
}

async function init(){
  $("syncUrl").value=localStorage.getItem(SYNC_URL_KEY)||"";
  $("modelSel").innerHTML=MODELS.map(m=>`<option value="${m.id}">${m.name} — ${m.desc}</option>`).join("");
  $("modeSel").innerHTML=Object.entries(MODES).map(([k,m])=>`<option value="${k}">${m.icon} ${m.name}</option>`).join("");
  $("themeSel").innerHTML=THEMES.map(t=>`<option value="${t.id}">● ${t.name}</option>`).join("");

  $("modelSel").value=S().model;
  S().mode=cur().mode||S().mode||"chat";
  $("modeSel").value=S().mode;
  $("themeSel").value=S().theme||"mimo";
  $("tempRange").value=S().temperature;
  $("tempVal").textContent=S().temperature;
  $("tokensRange").value=S().max_tokens;
  $("tokensVal").textContent=S().max_tokens;
  $("customPrompt").value=S().customPrompt||"";

  applyTheme(S().theme);
  renderModes();
  await pullSyncFromPc();
  $("modelSel").value=S().model;
  $("modeSel").value=S().mode;
  $("themeSel").value=S().theme||"mimo";
  renderAll();

  $("syncUrl").onchange=()=>{localStorage.setItem(SYNC_URL_KEY,$("syncUrl").value.trim());pullSyncFromPc();};
  $("syncNowBtn").onclick=async()=>{localStorage.setItem(SYNC_URL_KEY,$("syncUrl").value.trim());if(await pullSyncFromPc())await pushSyncToPc();renderAll();closeSettings();};
  document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible")pullSyncFromPc().then(ok=>{if(ok)renderAll();});});

  $("modelSel").onchange=()=>{S().model=$("modelSel").value;saveState();};
  $("modeSel").onchange=()=>setMode($("modeSel").value,true);
  $("themeSel").onchange=()=>applyTheme($("themeSel").value);
  $("tempRange").oninput=()=>{S().temperature=+$("tempRange").value;$("tempVal").textContent=S().temperature;saveState();};
  $("tokensRange").oninput=()=>{S().max_tokens=+$("tokensRange").value;$("tokensVal").textContent=S().max_tokens;saveState();};
  $("customPrompt").oninput=()=>{S().customPrompt=$("customPrompt").value;saveState();};

  $("sendBtn").onclick=()=>send();
  $("regenBtn").onclick=()=>send("",true);
  $("stopBtn").onclick=()=>abortCtrl?.abort();
  $("input").onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};
  $("input").oninput=autoResize;
  $("attachBtn").onclick=()=>$("fileIn").click();
  $("fileIn").onchange=onFiles;

  $("chatsBtn").onclick=openDrawer;
  $("backdrop").onclick=()=>{closeDrawer();closeSettings();};
  $("closeDrawer").onclick=closeDrawer;
  $("newChatBtn").onclick=createChat;
  $("newChatBtn2").onclick=createChat;
  $("clearChatBtn").onclick=clearChat;
  $("exportBtn").onclick=exportChat;
  $("settingsBtn").onclick=openSettings;
  $("closeSettings").onclick=closeSettings;
}

init();
</script>
</body>
</html>
